<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>상품 수정 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-bottom: 70px; }
        .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
        .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
        .card { border: none; border-radius: 12px; }
        footer { background-color: #212529; color: #fff; padding: 12px 0; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>
    </div>
</nav>

<div class="container" style="max-width: 600px;">
    <div class="d-flex align-items-center mb-4">
        <h4 class="fw-bold mb-0">상품 수정</h4>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-4">
            <form th:action="@{/products/{id}/edit(id=${productId})}" th:object="${productDto}" method="post">

                <div class="mb-3">
                    <label for="name" class="form-label small fw-bold">상품명</label>
                    <input type="text" th:field="*{name}" id="name" class="form-control" th:errorclass="is-invalid">
                    <div class="invalid-feedback" th:errors="*{name}">상품명 에러 메시지</div>
                </div>

                <div class="mb-3">
                    <label for="price" class="form-label small fw-bold">가격</label>
                    <input type="number" th:field="*{price}" id="price" class="form-control" th:errorclass="is-invalid">
                    <div class="invalid-feedback" th:errors="*{price}">가격 에러 메시지</div>
                </div>

                <div class="mb-3">
                    <label for="stock" class="form-label small fw-bold">재고</label>
                    <input type="number" th:field="*{stock}" id="stock" class="form-control" th:errorclass="is-invalid">
                    <div class="invalid-feedback" th:errors="*{stock}">재고 에러 메시지</div>
                </div>

                <div class="mb-4">
                    <label for="description" class="form-label small fw-bold">설명</label>
                    <textarea th:field="*{description}" id="description" class="form-control" rows="3"></textarea>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary w-100 fw-semibold">수정 완료</button>
                    <a th:href="@{/products}" class="btn btn-outline-secondary w-100">취소</a>
                </div>
            </form>
        </div>
    </div>
</div>

<footer class="text-center fixed-bottom">
    <div class="container">
        <p class="m-0" style="font-size: 0.85rem; letter-spacing: 0.3px;">
            실습 수행 일시: <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 (E) a hh:mm:ss')}"></span>
            │ 학번: 1971271 │ 성명: 백동진
        </p>
    </div>
</footer>

</body>
</html>
