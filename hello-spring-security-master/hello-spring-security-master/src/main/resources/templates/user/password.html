<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 변경 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-bottom: 70px; }
        .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
        .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
        .card { border: none; border-radius: 12px; }
        footer { background-color: #212529; color: #fff; padding: 12px 0; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>
    </div>
</nav>

<div class="container" style="max-width: 500px;">
    <div class="mb-4">
        <h4 class="fw-bold mb-0">비밀번호 변경</h4>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-4">
            <form th:action="@{/user/password}" th:object="${passwordChangeDto}" method="post">

                <div class="mb-3">
                    <label for="currentPassword" class="form-label small fw-bold">현재 비밀번호</label>
                    <input type="password" th:field="*{currentPassword}" id="currentPassword" class="form-control" th:errorclass="is-invalid">
                    <div class="invalid-feedback" th:errors="*{currentPassword}"></div>
                </div>

                <div class="mb-3">
                    <label for="newPassword" class="form-label small fw-bold">새 비밀번호</label>
                    <input type="password" th:field="*{newPassword}" id="newPassword" class="form-control" th:errorclass="is-invalid">
                    <div class="invalid-feedback" th:errors="*{newPassword}"></div>
                </div>

                <div class="mb-4">
                    <label for="confirmPassword" class="form-label small fw-bold">새 비밀번호 확인</label>
                    <input type="password" th:field="*{confirmPassword}" id="confirmPassword" class="form-control" th:errorclass="is-invalid">
                    <div class="invalid-feedback" th:errors="*{confirmPassword}"></div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary w-100 fw-semibold">변경하기</button>
                    <a th:href="@{/home}" class="btn btn-outline-secondary w-100">취소</a>
                </div>
            </form>
        </div>
    </div>
</div>

<footer class="text-center fixed-bottom">
    <div class="container">
        <p class="m-0" style="font-size: 0.85rem; letter-spacing: 0.3px;">
            실습 수행 일시: <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 (E) a hh:mm:ss')}"></span>
            │ 학번: 1971271 │ 성명: 백동진
        </p>
    </div>
</footer>

</body>
</html>
